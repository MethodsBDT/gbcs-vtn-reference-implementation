name: Build image in ECR

on:
  push:
     branches:
       - "v3_0_1"
  workflow_dispatch:

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: odr-vtn-3-0-1
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Set ECR_REGISTRY
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
      - name: Get version
        run: |
          echo "$(git rev-parse --short HEAD)"
          echo "IMAGE_VERSION_LAMBDA=lambda-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker image for arm64
        run: |
          docker buildx build --platform linux/arm64 --load --progress=plain -t $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA -f Dockerfile-lambda .
      - name: Tag images
        run: |
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
      - name: Push images
        run: |
          docker image push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          docker image push $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
