name: Build image in ECR

on:
  push:
  workflow_dispatch:

jobs:
  check-compatibility-vtn-3-1-0:
    runs-on: ubuntu-latest
    env:
      STORAGE_IMPLEMENTATION: IN_FILE
    steps:
      - name: Checkout VTN 3.1.0 repo
        uses: actions/checkout@v6
        with:
          path: vtn_3_1_0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'
      - name: Installs requirements
        run: |
          pip install -r vtn_3_1_0/requirements.txt

  build-and-push-image:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: odr-vtn-3-1-0
    needs: [ check-compatibility-vtn-3-1-0 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker image for arm64
        run: |
          docker buildx build --platform linux/arm64,linux/amd64 --load --progress=plain -t $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA -f Dockerfile-lambda .
      - name: Tag images
        run: |
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
      - name: Push images
        run: |
          # docker image push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          # docker image push $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
