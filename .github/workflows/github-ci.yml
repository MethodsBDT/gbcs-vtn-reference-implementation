name: Build image in ECR

on:
  push:
  workflow_dispatch:

jobs:
  check-compatibility-vtn-3-1-0:
    runs-on: ubuntu-latest
    env:
      STORAGE_IMPLEMENTATION: IN_FILE
    steps:
      - name: Checkout Test-tool
        uses: actions/checkout@v6
        with:
          repository: oadr3-org/openadr3-test-tool
          token: ${{ secrets.PAT }}
          path: test-tool
          ref: 'v3_0_1'
      - name: Checkout VTN 3.1.0 repo
        uses: actions/checkout@v6
        with:
          path: vtn_3_1_0
      - name: Checkout test-callback-service repo
        uses: actions/checkout@v6
        with:
          repository: oadr3-org/test-callback-service
          token: ${{ secrets.PAT }}
          path: test-callback-service
          ref: 'main'
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'
      - name: Installs requirements
        run: |
          pip install -r test-callback-service/requirements.txt
          pip install -r vtn_3_1_0/requirements.txt
          pip install -r test-tool/requirements.txt

      - name: Run Oadr3 tests again VTN 3.1.0 Reference implementation
        run: |
          python test-callback-service/run.py > /dev/null &
          sleep 5s
          cd vtn_3_1_0
          python -m swagger_server > /dev/null &
          cd ..
          sleep 5s
          pytest test-tool/OpenADR_tests/v3_1_0/VTN_test --vtn_base_url=http://127.0.0.1:8080/openadr3/3.1.0

  build-and-push-image:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: odr-vtn-3-1-0
    needs: [ check-compatibility-vtn-3-1-0 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      - name: Set ECR_REGISTRY
        run: echo "ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}" >> $GITHUB_ENV
      - name: Get version
        run: |
          echo "$(git rev-parse --short HEAD)"
          echo "IMAGE_VERSION_LAMBDA=lambda-$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      - name: Set up QEMU for arm64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build docker image for arm64
        run: |
          docker buildx build --platform linux/arm64 --load --progress=plain -t $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA -f Dockerfile-lambda .
      - name: Tag images
        run: |
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          docker image tag $ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
      - name: Push images
        run: |
          docker image push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_VERSION_LAMBDA
          docker image push $ECR_REGISTRY/$ECR_REPOSITORY:lambda-latest
