name: Build image in ECR

on:
  push:
  workflow_dispatch:

jobs:
  check-compatibility-vtn-3-1-0:
    runs-on: ubuntu-latest
    env:
      STORAGE_IMPLEMENTATION: IN_FILE
    steps:
      - name: Checkout VTN 3.1.0 repo
        uses: actions/checkout@v6
        with:
          path: vtn_3_1_0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          architecture: 'x64'
      - name: Installs requirements
        run: |
          pip install -r vtn_3_1_0/requirements.txt

  build-and-push-image:
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      ECR_REPOSITORY: odr-vtn-3-1-0
    needs: [ check-compatibility-vtn-3-1-0 ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: stevekay72/gbcs-vtn-new

      - name: Build and push Docker images
        id: push
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

