        A duration of default "P9999Y" may indicate infinity. See User Guide.
        A randomizeStart indicates absolute range of client applied offset to start. See User Guide.
      example:
        duration: PT1H
        randomizeStart: PT1H
        start: 2023-06-15T09:30:00Z
      properties:
        start:
          description: datetime in ISO 8601 format
          example: 2023-06-15T09:30:00Z
          format: date-time
          title: dateTime
          type: string
        duration:
          default: PT0S
          description: duration in ISO 8601 format
          example: PT1H
          pattern: "^(-?)P(?=\\d|T\\d)(?:(\\d+)Y)?(?:(\\d+)M)?(?:(\\d+)([DW]))?(?:T(?:(\\\
            d+)H)?(?:(\\d+)M)?(?:(\\d+(?:\\.\\d+)?)S)?)?$"
          title: duration
          type: string
        randomizeStart:
          default: PT0S
          description: duration in ISO 8601 format
          example: PT1H
          pattern: "^(-?)P(?=\\d|T\\d)(?:(\\d+)Y)?(?:(\\d+)M)?(?:(\\d+)([DW]))?(?:T(?:(\\\
            d+)H)?(?:(\\d+)M)?(?:(\\d+(?:\\.\\d+)?)S)?)?$"
          title: duration
          type: string
      title: intervalPeriod
      type: object
    valuesMap:
      description: |
        Represents one or more values associated with a type.
        E.g. a type of PRICE contains a single float value.
      example:
        values:
        - 0.17
        type: PRICE
      properties:
        type:
          description: |
            Enumerated or private string signifying the nature of values.
            E.G. "PRICE" indicates value is to be interpreted as a currency.
          example: PRICE
          maxLength: 128
          minLength: 1
          title: type
          type: string
        values:
          description: A list of data points. Most often a singular value such as
            a price.
          example:
          - 0.17
          items:
            $ref: '#/components/schemas/valuesMap_values_inner'
          title: values
          type: array
      required:
      - type
      - values
      title: valuesMap
      type: object
    point:
      description: A pair of floats typically used as a point on a 2 dimensional grid.
      properties:
        x:
          description: A value on an x axis.
          example: 1.0
          format: float
          title: x
          type: number
        "y":
          description: A value on a y axis.
          example: 2.0
          format: float
          title: "y"
          type: number
      required:
      - x
      - "y"
      title: point
      type: object
    eventPayloadDescriptor:
      description: |
        Contextual information used to interpret event valuesMap values.
        E.g. a PRICE payload simply contains a price value, an
        associated descriptor provides necessary context such as units and currency.
      example:
        payloadType: PRICE
        currency: USD
        units: KWH
        objectType: EVENT_PAYLOAD_DESCRIPTOR
      properties:
        objectType:
          description: Used as discriminator.
          enum:
          - EVENT_PAYLOAD_DESCRIPTOR
          title: objectType
          type: string
        payloadType:
          description: Enumerated or private string signifying the nature of values.
          example: PRICE
          maxLength: 128
          minLength: 1
          title: payloadType
          type: string
        units:
          description: Units of measure.
          example: KWH
          nullable: true
          title: units
          type: string
        currency:
          description: Currency of price payload.
          example: USD
          nullable: true
          title: currency
          type: string
      required:
      - payloadType
      title: eventPayloadDescriptor
      type: object
    reportPayloadDescriptor:
      description: |
        Contextual information used to interpret report payload values.
        E.g. a USAGE payload simply contains a usage value, an
        associated descriptor provides necessary context such as units and data quality.
      example:
        payloadType: USAGE
        confidence: 100
        accuracy: 0.0
        units: KWH
        readingType: DIRECT_READ
        objectType: REPORT_PAYLOAD_DESCRIPTOR
      properties:
        objectType:
          description: Used as discriminator.
          enum:
          - REPORT_PAYLOAD_DESCRIPTOR
          title: objectType
          type: string
        payloadType:
          description: Enumerated or private string signifying the nature of values.
          example: USAGE
          maxLength: 128
          minLength: 1
          title: payloadType
          type: string
        readingType:
          description: Enumerated or private string signifying the type of reading.
          example: DIRECT_READ
          nullable: true
          title: readingType
          type: string
        units:
          description: Units of measure.
          example: KWH
          nullable: true
          title: units
          type: string
        accuracy:
          description: A quantification of the accuracy of a set of payload values.
          example: 0.0
          format: float
          nullable: true
          title: accuracy
          type: number
        confidence:
          description: A quantification of the confidence in a set of payload values.
          example: 100
          format: int32
          maximum: 100
          minimum: 0
          nullable: true
          title: confidence
          type: integer
      required:
      - payloadType
      title: reportPayloadDescriptor
      type: object
    reportDescriptor:
      description: |
        An object that may be used to request a report from a VEN.
      example:
        payloadType: USAGE
        startInterval: -1
        numIntervals: -1
        repeat: 1
        reportIntervals: INTERVALS
        historical: true
        units: KWH
        readingType: DIRECT_READ
        targets:
        - values:
          - 0.17
          type: PRICE
        - values:
          - 0.17
          type: PRICE
        aggregate: false
        frequency: -1
      properties:
        payloadType:
          description: Enumerated or private string signifying the nature of values.
          example: USAGE
          maxLength: 128
          minLength: 1
          title: payloadType
          type: string
        readingType:
          description: Enumerated or private string signifying the type of reading.
          example: DIRECT_READ
          nullable: true
          title: readingType
          type: string
        units:
          description: Units of measure.
          example: KWH
          nullable: true
          title: units
          type: string
        targets:
          description: A list of valuesMap objects.
          items:
            $ref: '#/components/schemas/valuesMap'
          nullable: true
          title: targets
          type: array
        aggregate:
          default: false
          description: |
            True if report should aggregate results from all targeted resources.
            False if report includes results for each resource.
          example: false
          title: aggregate
          type: boolean
        startInterval:
          default: -1
          description: |
            The interval on which to generate a report.
            -1 indicates generate report at end of last interval.
          example: -1
          format: int32
          title: startInterval
          type: integer
        numIntervals:
          default: -1
          description: |
            The number of intervals to include in a report.
            -1 indicates that all intervals are to be included.
          example: -1
          format: int32
          title: numIntervals
          type: integer
        historical:
          default: true
          description: |
            True indicates report on intervals preceding startInterval.
            False indicates report on intervals following startInterval (e.g. forecast).
          example: true
          title: historical
          type: boolean
        frequency:
          default: -1
          description: |
            Number of intervals that elapse between reports.
            -1 indicates same as numIntervals.
          example: -1
          format: int32
          title: frequency
          type: integer
        repeat:
          default: 1
          description: |
            Number of times to repeat report.
            1 indicates generate one report.
            -1 indicates repeat indefinitely.
          example: 1
          format: int32
          title: repeat
          type: integer
        reportIntervals:
          description: Indicates VEN report interval options. See User Guide.
          enum:
          - INTERVALS
          - SUB_INTERVALS
          - OPEN_INTERVALS
          example: INTERVALS
          title: reportIntervals
          type: string
      required:
      - payloadType
      title: reportDescriptor
      type: object
    objectID:
      description: URL safe VTN assigned object ID.
      example: object-999
      maxLength: 128
      minLength: 1
      pattern: "^[a-zA-Z0-9_-]*$"
      title: objectID
      type: string
    notification:
      description: |
        VTN generated object included in request to subscription callbackUrl.
      properties:
        objectType:
          $ref: '#/components/schemas/objectTypes'
        operation:
          description: the operation on on object that triggered the notification.
          enum:
          - CREATE
          - READ
          - UPDATE
          - DELETE
          example: POST
          title: operation
          type: string
        object:
          $ref: '#/components/schemas/notification_object'
        targets:
          description: A list of valuesMap objects.
          items:
            $ref: '#/components/schemas/valuesMap'
          nullable: true
          title: targets
          type: array
      required:
      - object
      - objectType
      - operation
      title: notification
      type: object
    objectTypes:
      description: Types of objects addressable through API.
      enum:
      - PROGRAM
      - EVENT
      - REPORT
      - SUBSCRIPTION
      - VEN
      - RESOURCE
      example: EVENT
      title: objectTypes
      type: string
    dateTime:
      description: datetime in ISO 8601 format
      example: 2023-06-15T09:30:00Z
      format: date-time
      title: dateTime
      type: string
    duration:
      default: PT0S
      description: duration in ISO 8601 format
      example: PT1H
      pattern: "^(-?)P(?=\\d|T\\d)(?:(\\d+)Y)?(?:(\\d+)M)?(?:(\\d+)([DW]))?(?:T(?:(\\\
        d+)H)?(?:(\\d+)M)?(?:(\\d+(?:\\.\\d+)?)S)?)?$"
      title: duration
      type: string
    clientCredentialRequest:
      description: |
        Body of POST request to /auth/token. Note snake case per https://www.rfc-editor.org/rfc/rfc6749
      properties:
        grant_type:
          description: "OAuth2 grant type, must be 'client_credentials'"
          enum:
          - client_credentials
          example: client_credentials
          type: string
        client_id:
          description: client ID to exchange for bearer token.
          example: ven_client_99
          maxLength: 4096
          minLength: 1
          type: string
        client_secret:
          description: client secret to exchange for bearer token.
          example: ven_secret_99
          maxLength: 4096
          minLength: 1
          type: string
        scope:
          description: application defined scope.
          example: read_all
          maxLength: 4096
          minLength: 0
          type: string
      required:
      - client_id
      - client_secret
      - grant_type
      type: object
    clientCredentialResponse:
      description: |
        Body response from /auth/token. Note snake case per https://www.rfc-editor.org/rfc/rfc6749
      example:
        access_token: MTQ0NjJkZmQ5OTM2NDE1ZTZjNGZmZjI3
        refresh_token: IwOGYzYTlmM2YxOTQ5MGE3YmNmMDFkNTVk
        scope: read_all
        token_type: Bearer
        expires_in: 3600
      properties:
        access_token:
          description: access token provided by Authorization service
          example: MTQ0NjJkZmQ5OTM2NDE1ZTZjNGZmZjI3
          maxLength: 4096
          minLength: 1
          title: access_token
          type: string
        token_type:
          description: "token type, must be Bearer."
          enum:
          - Bearer
          example: Bearer
          title: token_type
          type: string
        expires_in:
          description: expiration period in seconds.
          example: 3600
          title: expires_in
          type: integer
        refresh_token:
          description: refresh token provided by Authorization service
          example: IwOGYzYTlmM2YxOTQ5MGE3YmNmMDFkNTVk
          maxLength: 4096
          minLength: 1
          title: refresh_token
          type: string
        scope:
          description: application defined scope.
          example: read_all
          maxLength: 4096
          minLength: 0
          title: scope
          type: string
      required:
      - access_token
      - token_type
      title: clientCredentialResponse
      type: object
    authError:
      description: error response on HTTP 400 from auth/token per https://www.rfc-editor.org/rfc/rfc6749
      properties:
        error:
          description: "As described in rfc6749 | invalid_request – The request is\
            \ missing a parameter so the server can’t proceed with the request. This\
            \ may also be returned if the request includes an unsupported parameter\
            \ or repeats a parameter. invalid_client – Client authentication failed,\
            \ such as if the request contains an invalid client ID or secret. Send\
            \ an HTTP 401 response in this case. invalid_grant – The authorization\
            \ code (or user’s password for the password grant type) is invalid or\
            \ expired. This is also the error you would return if the redirect URL\
            \ given in the authorization grant does not match the URL provided in\
            \ this access token request. invalid_scope – For access token requests\
            \ that include a scope (password or client_credentials grants), this error\
            \ indicates an invalid scope value in the request. unauthorized_client\
            \ – This client is not authorized to use the requested grant type. For\
            \ example, if you restrict which applications can use the Implicit grant,\
            \ you would return this error for the other apps. unsupported_grant_type\
            \ – If a grant type is requested that the authorization server doesn’\
            t recognize, use this code. Note that unknown grant types also use this\
            \ specific error code rather than using the invalid_request above."
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - invalid_scope
          - unauthorized_client
          - unsupported_grant_type
          example: invalid_request
          type: string
        error_description:
          description: Should be a sentence or two at most describing the circumstance
            of the error
          example: Request was missing the 'client_id' parameter.
          type: string
        error_uri:
          description: Optional reference to more detailed error description
          example: See the full API docs at https://authorization-server.com/docs/access_toke
          format: uri
          type: string
      required:
      - error
      type: object
    authServerInfo:
      example:
        tokenURL: https://openapi-generator.tech
      properties:
        tokenURL:
          description: URL of the token endpoint.
          format: uri
          title: tokenURL
          type: string
      required:
      - tokenURL
      title: authServerInfo
      type: object
    problem:
      description: |
        reusable error response. From https://opensource.zalando.com/problem/schema.yaml.
      example:
        instance: https://openapi-generator.tech
        detail: Connection to database timed out
        type: https://zalando.github.io/problem/constraint-violation
        title: title
        status: 503
      properties:
        type:
          default: about:blank
          description: |
            An absolute URI that identifies the problem type.
            When dereferenced, it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          example: https://zalando.github.io/problem/constraint-violation
          format: uri
          title: type
          type: string
        title:
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable.
          title: title
          type: string
        status:
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          example: 503
          exclusiveMaximum: true
          format: int32
          maximum: 600
          minimum: 100
          title: status
          type: integer
        detail:
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
          title: detail
          type: string
        instance:
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
          format: uri
          title: instance
          type: string
      title: problem
      type: object
    programRequest_programDescriptions_inner:
      example:
        URL: www.myCorporation.com/myProgramDescription
      properties:
        URL:
          description: A human or machine readable program description
          example: www.myCorporation.com/myProgramDescription
          format: uri
          title: URL
          type: string
      required:
      - URL
      title: programRequest_programDescriptions_inner
    programRequest_payloadDescriptors_inner:
      anyOf:
      - $ref: '#/components/schemas/eventPayloadDescriptor'
      - $ref: '#/components/schemas/reportPayloadDescriptor'
      discriminator:
        propertyName: objectType
      title: programRequest_payloadDescriptors_inner
    reportRequest_resources_inner:
      description: Report data associated with a resource.
      example:
        intervals:
        - payloads:
          - values:
            - 0.17
            type: PRICE
          - values:
            - 0.17
            type: PRICE
          id: 0
          intervalPeriod:
            duration: PT1H
            randomizeStart: PT1H
            start: 2023-06-15T09:30:00Z
        - payloads:
          - values:
            - 0.17
            type: PRICE
          - values:
            - 0.17
            type: PRICE
          id: 0
          intervalPeriod:
            duration: PT1H
            randomizeStart: PT1H
            start: 2023-06-15T09:30:00Z
        resourceName: RESOURCE-999
        intervalPeriod:
          duration: PT1H
          randomizeStart: PT1H
          start: 2023-06-15T09:30:00Z
      properties:
        resourceName:
          description: User generated identifier. A value of AGGREGATED_REPORT indicates
            an aggregation of more that one resource's data
          example: RESOURCE-999
          maxLength: 128
          minLength: 1
          title: resourceName
          type: string
        intervalPeriod:
          $ref: '#/components/schemas/intervalPeriod'
        intervals:
          description: A list of interval objects.
          items:
            $ref: '#/components/schemas/interval'
          title: intervals
          type: array
      required:
      - intervals
      - resourceName
      title: reportRequest_resources_inner
      type: object
    subscriptionRequest_objectOperations_inner:
      description: "object type, operations, and callbackUrl."
      example:
        operations:
        - CREATE
        - CREATE
        bearerToken: NCEJGI9E8ER9802UT9HUG
        objects:
        - EVENT
        - EVENT
        callbackUrl: https://myserver.com/send/callback/here
      properties:
        objects:
          description: list of objects to subscribe to.
          items:
            $ref: '#/components/schemas/objectTypes'
          title: objects
          type: array
        operations:
          description: list of operations to subscribe to.
          items:
            description: object operation to subscribe to.
            enum:
            - READ
            - CREATE
            - UPDATE
            - DELETE
            example: CREATE
            type: string
          title: operations
          type: array
        callbackUrl:
          description: User provided webhook URL.
          example: https://myserver.com/send/callback/here
          format: uri
          title: callbackUrl
          type: string
        bearerToken:
          description: |
            User provided token.
            To avoid custom integrations, callback endpoints
            should accept the provided bearer token to authenticate VTN requests.
          example: NCEJGI9E8ER9802UT9HUG
          nullable: true
          title: bearerToken
          type: string
      required:
      - callbackUrl
      - objects
      - operations
      title: subscriptionRequest_objectOperations_inner
      type: object
    valuesMap_values_inner:
      anyOf:
      - type: number
      - type: integer
      - type: string
      - type: boolean
      - $ref: '#/components/schemas/point'
      title: valuesMap_values_inner
    notification_object:
      description: the object that is the subject of the notification.
      discriminator:
        propertyName: objectType
      example: {}
      oneOf:
      - $ref: '#/components/schemas/program'
      - $ref: '#/components/schemas/report'
      - $ref: '#/components/schemas/event'
      - $ref: '#/components/schemas/subscription'
      - $ref: '#/components/schemas/ven'
      - $ref: '#/components/schemas/resource'
      title: notification_object
      type: object
  securitySchemes:
    oAuth2ClientCredentials:
      description: Client credential flow.
      flows:
        clientCredentials:
          scopes:
            read_all: VENs and BL can read all resources
            write_programs: Only BL can write to programs
            write_events: Only BL can write to events
            write_reports: only VENs can write to reports
            write_subscriptions: VENs and BL can write to subscriptions
            write_vens: VENS and BL can write to vens and resources
          tokenUrl: auth/token
      type: oauth2
      x-tokenInfoFunc: swagger_server.controllers.authorization_controller.check_oAuth2ClientCredentials
      x-scopeValidateFunc: swagger_server.controllers.authorization_controller.validate_scope_oAuth2ClientCredentials
    bearerAuth:
      bearerFormat: JWT
      scheme: bearer
      type: http
      x-bearerInfoFunc: swagger_server.controllers.authorization_controller.check_bearerAuth
