components:
  schemas:
    program:
      type: object
      description: Server provided representation of program
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/programRequest"
    programRequest:
      required:
      - programName
      type: object
      properties:
        programName:
          maxLength: 128
          minLength: 1
          type: string
          description: Short name to uniquely identify program.
          example: ResTOU
        intervalPeriod:
          $ref: "#/components/schemas/intervalPeriod"
        programDescriptions:
          type: array
          description: A list of programDescriptions
          nullable: true
          items:
            $ref: "#/components/schemas/programRequest_programDescriptions"
        payloadDescriptors:
          type: array
          description: A list of payloadDescriptors.
          nullable: true
          items:
            discriminator:
              propertyName: objectType
            anyOf:
            - $ref: "#/components/schemas/eventPayloadDescriptor"
            - $ref: "#/components/schemas/reportPayloadDescriptor"
        attributes:
          type: array
          description: A list of valuesMap objects describing attributes.
          nullable: true
          items:
            $ref: "#/components/schemas/valuesMap"
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
      description: Client provided description of program
    report:
      type: object
      description: Server provided representation of report
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/reportRequest"
      - required:
        - clientID
        type: object
        properties:
          clientID:
            $ref: "#/components/schemas/clientID"
    reportRequest:
      required:
      - clientName
      - eventID
      - resources
      type: object
      properties:
        eventID:
          $ref: "#/components/schemas/objectID"
        clientName:
          $ref: "#/components/schemas/clientName"
        reportName:
          type: string
          description: User defined string for use in debugging or User Interface.
          nullable: true
          example: Battery_usage_04112023
        payloadDescriptors:
          type: array
          description: A list of reportPayloadDescriptors.
          nullable: true
          items:
            $ref: "#/components/schemas/reportPayloadDescriptor"
        resources:
          type: array
          description: A list of objects containing report data for a set of resources.
          items:
            $ref: "#/components/schemas/reportRequest_resources"
      description: report object.
    event:
      type: object
      description: Server provided representation of event
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/eventRequest"
    eventRequest:
      required:
      - programID
      type: object
      properties:
        programID:
          $ref: "#/components/schemas/objectID"
        eventName:
          type: string
          description: User defined string for use in debugging or User Interface.
          nullable: true
          example: price event 11-18-2022
        duration:
          $ref: "#/components/schemas/duration"
        priority:
          minimum: 0
          type: integer
          description: Relative priority of event. A lower number is a higher priority.
          nullable: true
          example: 0
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
        reportDescriptors:
          type: array
          description: A list of reportDescriptor objects. Used to request reports
            from VEN.
          nullable: true
          items:
            $ref: "#/components/schemas/reportDescriptor"
        payloadDescriptors:
          type: array
          description: A list of payloadDescriptor objects.
          nullable: true
          items:
            $ref: "#/components/schemas/eventPayloadDescriptor"
        intervalPeriod:
          $ref: "#/components/schemas/intervalPeriod"
        intervals:
          type: array
          description: A list of interval objects.
          items:
            $ref: "#/components/schemas/interval"
      description: |
        Event object to communicate a Demand Response request to VEN.
        If intervalPeriod is present, sets default start time and duration of intervals.
    subscription:
      type: object
      description: Server provided representation of subscription
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/subscriptionRequest"
      - required:
        - clientID
        type: object
        properties:
          clientID:
            $ref: "#/components/schemas/clientID"
    subscriptionRequest:
      required:
      - clientName
      - objectOperations
      type: object
      properties:
        clientName:
          $ref: "#/components/schemas/clientName"
        programID:
          $ref: "#/components/schemas/objectID"
        objectOperations:
          type: array
          description: list of objects and operations to subscribe to.
          items:
            $ref: "#/components/schemas/subscriptionRequest_objectOperations"
        targets:
          type: array
          description: A list of target objects. Used by server to filter notifications.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
      description: |
        An object created by a client to receive notification of operations on objects.
        Clients may subscribe to be notified when a type of object is created,
        updated, or deleted.
    ven:
      type: object
      description: Server provided representation of ven
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/BlVenRequest"
    venRequest:
      oneOf:
      - $ref: "#/components/schemas/VenVenRequest"
      - $ref: "#/components/schemas/BlVenRequest"
    BlVenRequest:
      required:
      - clientID
      - objectType
      - venName
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - BL_VEN_REQUEST
        clientID:
          $ref: "#/components/schemas/clientID"
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
        venName:
          $ref: "#/components/schemas/venName"
        attributes:
          type: array
          description: A list of valuesMap objects describing attributes.
          nullable: true
          items:
            $ref: "#/components/schemas/valuesMap"
      description: Business Logic provided representation of ven.
    VenVenRequest:
      required:
      - objectType
      - venName
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - VEN_VEN_REQUEST
        venName:
          $ref: "#/components/schemas/venName"
        attributes:
          type: array
          description: A list of valuesMap objects describing attributes.
          nullable: true
          items:
            $ref: "#/components/schemas/valuesMap"
      description: VEN provided representation of ven.
    resource:
      type: object
      description: Server provided representation of resource
      allOf:
      - $ref: "#/components/schemas/objectMetadata"
      - $ref: "#/components/schemas/BlResourceRequest"
    resourceRequest:
      oneOf:
      - $ref: "#/components/schemas/BlResourceRequest"
      - $ref: "#/components/schemas/VenResourceRequest"
    BlResourceRequest:
      required:
      - clientID
      - objectType
      - resourceName
      - venID
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - BL_RESOURCE_REQUEST
        clientID:
          $ref: "#/components/schemas/clientID"
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
        resourceName:
          $ref: "#/components/schemas/resourceName"
        venID:
          $ref: "#/components/schemas/objectID"
        attributes:
          type: array
          description: A list of valuesMap objects describing attributes.
          nullable: true
          items:
            $ref: "#/components/schemas/valuesMap"
      description: |
        Business Logic provided representation of ven resource.
    VenResourceRequest:
      required:
      - objectType
      - resourceName
      - venID
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - VEN_RESOURCE_REQUEST
        resourceName:
          $ref: "#/components/schemas/resourceName"
        venID:
          $ref: "#/components/schemas/objectID"
        attributes:
          type: array
          description: A list of valuesMap objects describing attributes.
          nullable: true
          items:
            $ref: "#/components/schemas/valuesMap"
      description: |
        Business Logic provided representation of ven resource.
    objectMetadata:
      required:
      - createdDateTime
      - id
      - modificationDateTime
      - objectType
      type: object
      properties:
        id:
          $ref: "#/components/schemas/objectID"
        createdDateTime:
          $ref: "#/components/schemas/dateTime"
        modificationDateTime:
          $ref: "#/components/schemas/dateTime"
        objectType:
          $ref: "#/components/schemas/objectTypes"
      description: metadata common to all addressable objects. Values provided by
        VTN on object creation.
    interval:
      required:
      - id
      - payloads
      type: object
      properties:
        id:
          type: integer
          description: A client generated number assigned an interval object. Not
            a sequence number.
          format: int32
          example: 0
        intervalPeriod:
          $ref: "#/components/schemas/intervalPeriod"
        payloads:
          type: array
          description: A list of valuesMap objects.
          items:
            $ref: "#/components/schemas/valuesMap"
      description: |
        An object defining a temporal window and a list of valuesMaps.
        if intervalPeriod present may set temporal aspects of interval or override event.intervalPeriod.
    intervalPeriod:
      type: object
      properties:
        start:
          $ref: "#/components/schemas/dateTime"
        duration:
          $ref: "#/components/schemas/duration"
        randomizeStart:
          $ref: "#/components/schemas/duration"
      description: |
        Defines temporal aspects of intervals.
        A start of "0000-00-00" or "0000-00-00T00:00:00" may indicate 'now'. See User Guide.
        A duration of "P9999Y" may indicate infinity. See User Guide.
        A randomizeStart indicates absolute range of client applied offset to start. See User Guide.
    valuesMap:
      required:
      - type
      - values
      type: object
      properties:
        type:
          maxLength: 128
          minLength: 1
          type: string
          description: |
            Represents the nature of values.

            See enumerations in Definitions for defined string values, or use privately defined strings
          example: PRICE
        values:
          type: array
          description: A list of data points. Most often a singular value such as
            a price.
          example:
          - 0.17
          items:
            anyOf:
            - type: number
            - type: integer
            - type: string
            - type: boolean
            - $ref: "#/components/schemas/point"
      description: |
        Represents one or more values associated with a type.

        See enumerations in Definitions for defined string values, or use privately defined strings
    point:
      required:
      - x
      - "y"
      type: object
      properties:
        x:
          type: number
          description: A value on an x axis.
          format: float
          example: 1
        "y":
          type: number
          description: A value on a y axis.
          format: float
          example: 2
      description: A pair of floats typically used as a point on a 2 dimensional grid.
    eventPayloadDescriptor:
      required:
      - objectType
      - payloadType
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - EVENT_PAYLOAD_DESCRIPTOR
        payloadType:
          maxLength: 128
          minLength: 1
          type: string
          description: |
            Represents the nature of values.

            See enumerations in Definitions for defined string values, or use privately defined strings
          example: PRICE
        units:
          $ref: "#/components/schemas/units"
        currency:
          type: string
          description: Currency of price payload.
          nullable: true
          example: USD
      description: |
        Contextual information used to interpret event valuesMap values.
        E.g. a PRICE payload simply contains a price value, an
        associated descriptor provides necessary context such as units and currency.
    reportPayloadDescriptor:
      required:
      - objectType
      - payloadType
      type: object
      properties:
        objectType:
          type: string
          description: Used as discriminator.
          enum:
          - REPORT_PAYLOAD_DESCRIPTOR
        payloadType:
          maxLength: 128
          minLength: 1
          type: string
          description: |
            Represents the nature of values.

            See enumerations in Definitions for defined string values, or use privately defined strings
          example: USAGE
        readingType:
          $ref: "#/components/schemas/readingType"
        units:
          $ref: "#/components/schemas/units"
        accuracy:
          type: number
          description: A quantification of the accuracy of a set of payload values.
          format: float
          nullable: true
          example: 0
        confidence:
          maximum: 100
          minimum: 0
          type: integer
          description: A quantification of the confidence in a set of payload values.
          format: int32
          nullable: true
          example: 100
      description: |
        Contextual information used to interpret report payload values.
        E.g. a USAGE payload simply contains a usage value, an
        associated descriptor provides necessary context such as units and data quality.
    reportDescriptor:
      required:
      - payloadType
      type: object
      properties:
        payloadType:
          maxLength: 128
          minLength: 1
          type: string
          description: |
            Represents the nature of values.

            See enumerations in Definitions for defined string values, or use privately defined strings
          example: USAGE
        readingType:
          $ref: "#/components/schemas/readingType"
        units:
          $ref: "#/components/schemas/units"
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
        aggregate:
          type: boolean
          description: |
            True if report should aggregate results from all targeted resources.
            False if report includes results for each resource.
          example: false
          default: false
        startInterval:
          type: integer
          description: |
            The interval on which to generate a report.
            -1 indicates generate report at end of last interval.
          format: int32
          example: -1
          default: -1
        numIntervals:
          type: integer
          description: |
            The number of intervals to include in a report.
            -1 indicates that all intervals are to be included.
          format: int32
          example: -1
          default: -1
        historical:
          type: boolean
          description: |
            True indicates report on intervals preceding startInterval.
            False indicates report on intervals following startInterval (e.g. forecast).
          example: true
          default: true
        frequency:
          type: integer
          description: |
            Number of intervals that elapse between reports.
            -1 indicates same as numIntervals.
          format: int32
          example: -1
          default: -1
        repeat:
          type: integer
          description: |
            Number of times to repeat report.
            1 indicates generate one report.
            -1 indicates repeat indefinitely.
          format: int32
          example: 1
          default: 1
        reportIntervals:
          type: string
          description: Indicates VEN report interval options. See User Guide.
          example: INTERVALS
          default: INTERVALS
          enum:
          - INTERVALS
          - SUB_INTERVALS
          - OPEN_INTERVALS
      description: |
        An object that may be used to request a report from a VEN.
    objectID:
      maxLength: 128
      minLength: 1
      pattern: "^[a-zA-Z0-9_-]*$"
      type: string
      description: URL safe VTN assigned object ID.
      example: object-999
    clientID:
      maxLength: 128
      minLength: 1
      type: string
      description: |
        ClientID as provisioned by Auhtentication Service and associated with client's bearer token
      example: 249rj49jiej
    venName:
      maxLength: 128
      minLength: 1
      type: string
      description: |
        User generated identifier, may be VEN identifier provisioned out-of-band.
        venName is expected to be unique within the scope of a VTN
      example: VEN-999
    clientName:
      maxLength: 128
      minLength: 1
      type: string
      description: "User generated identifier, may be VEN identifier provisioned out-of-band."
      example: VEN-999
    target:
      maxLength: 128
      minLength: 1
      type: string
      description: User generated target string.
      example: group-1
    resourceName:
      maxLength: 128
      minLength: 1
      type: string
      description: User generated identifier. A value of AGGREGATED_REPORT indicates
        an aggregation of more that one resource's data
      example: RESOURCE-999
    units:
      maxLength: 128
      minLength: 1
      type: string
      description: Units of measure.
      nullable: true
      example: KWH
    readingType:
      maxLength: 128
      minLength: 1
      type: string
      description: |
        Represents the type of reading.

        See enumerations in Definitions for defined string values, or use privately defined strings
      nullable: true
      example: DIRECT_READ
    notification:
      required:
      - object
      - objectType
      - operation
      type: object
      properties:
        objectType:
          $ref: "#/components/schemas/objectTypes"
        operation:
          type: string
          description: the operation on on object that triggered the notification.
          example: UPDATE
          enum:
          - CREATE
          - READ
          - UPDATE
          - DELETE
        object:
          type: object
          description: the object that is the subject of the notification.
          example: {}
          discriminator:
            propertyName: objectType
          oneOf:
          - $ref: "#/components/schemas/program"
          - $ref: "#/components/schemas/report"
          - $ref: "#/components/schemas/event"
          - $ref: "#/components/schemas/subscription"
          - $ref: "#/components/schemas/ven"
          - $ref: "#/components/schemas/resource"
        targets:
          type: array
          description: A list of targets.
          nullable: true
          items:
            $ref: "#/components/schemas/target"
      description: |
        VTN generated object included in request to subscription callbackUrl.
    objectTypes:
      type: string
      description: Types of objects addressable through API.
      example: EVENT
      enum:
      - PROGRAM
      - EVENT
      - REPORT
      - SUBSCRIPTION
      - VEN
      - RESOURCE
    dateTime:
      type: string
      description: datetime in RFC 3339 format
      format: date-time
      example: 2023-06-15T09:30:00Z
    duration:
      pattern: "^(-?)P(?=\\d|T\\d)(?:(\\d+)Y)?(?:(\\d+)M)?(?:(\\d+)([DW]))?(?:T(?:(\\\
        d+)H)?(?:(\\d+)M)?(?:(\\d+(?:\\.\\d+)?)S)?)?$"
      type: string
      description: duration in ISO 8601 format
      example: PT1H
      default: PT0S
    clientCredentialRequest:
      required:
      - client_id
      - client_secret
      - grant_type
      type: object
      properties:
        grant_type:
          type: string
          description: "OAuth2 grant type, must be 'client_credentials'"
          example: client_credentials
          enum:
          - client_credentials
        client_id:
          maxLength: 4096
          minLength: 1
          type: string
          description: client ID to exchange for bearer token.
          example: ven_client_99
        client_secret:
          maxLength: 4096
          minLength: 1
          type: string
          description: client secret to exchange for bearer token.
          example: ven_secret_99
        scope:
          maxLength: 4096
          minLength: 0
          type: string
          description: application defined scope.
          example: read_all
      description: |
        Body of POST request to /auth/token. Note snake case per https://www.rfc-editor.org/rfc/rfc6749
    clientCredentialResponse:
      required:
      - access_token
      - token_type
      type: object
      properties:
        access_token:
          maxLength: 4096
          minLength: 1
          type: string
          description: access token provided by Authorization service
          example: MTQ0NjJkZmQ5OTM2NDE1ZTZjNGZmZjI3
        token_type:
          type: string
          description: "token type, must be Bearer."
          example: Bearer
          enum:
          - Bearer
        expires_in:
          type: integer
          description: expiration period in seconds.
          example: 3600
        refresh_token:
          maxLength: 4096
          minLength: 1
          type: string
          description: refresh token provided by Authorization service
          example: IwOGYzYTlmM2YxOTQ5MGE3YmNmMDFkNTVk
        scope:
          maxLength: 4096
          minLength: 0
          type: string
          description: application defined scope.
          example: read_all
      description: |
        Body response from /auth/token. Note snake case per https://www.rfc-editor.org/rfc/rfc6749
      example:
        access_token: MTQ0NjJkZmQ5OTM2NDE1ZTZjNGZmZjI3
        refresh_token: IwOGYzYTlmM2YxOTQ5MGE3YmNmMDFkNTVk
        scope: read_all
        token_type: Bearer
        expires_in: 3600
    authError:
      required:
      - error
      type: object
      properties:
        error:
          type: string
          description: "As described in rfc6749 | invalid_request – The request is\
            \ missing a parameter so the server can’t proceed with the request. This\
            \ may also be returned if the request includes an unsupported parameter\
            \ or repeats a parameter. invalid_client – Client authentication failed,\
            \ such as if the request contains an invalid client ID or secret. Send\
            \ an HTTP 401 response in this case. invalid_grant – The authorization\
            \ code (or user’s password for the password grant type) is invalid or\
            \ expired. This is also the error you would return if the redirect URL\
            \ given in the authorization grant does not match the URL provided in\
            \ this access token request. invalid_scope – For access token requests\
            \ that include a scope (password or client_credentials grants), this error\
            \ indicates an invalid scope value in the request. unauthorized_client\
            \ – This client is not authorized to use the requested grant type. For\
            \ example, if you restrict which applications can use the Implicit grant,\
            \ you would return this error for the other apps. unsupported_grant_type\
            \ – If a grant type is requested that the authorization server doesn’\
            t recognize, use this code. Note that unknown grant types also use this\
            \ specific error code rather than using the invalid_request above."
          example: invalid_request
          enum:
          - invalid_request
          - invalid_client
          - invalid_grant
          - invalid_scope
          - unauthorized_client
          - unsupported_grant_type
        error_description:
          type: string
          description: Should be a sentence or two at most describing the circumstance
            of the error
          example: Request was missing the 'client_id' parameter.
        error_uri:
          maxLength: 8000
          minLength: 2
          type: string
          description: Optional reference to more detailed error description
          format: uri
          example: See the full API docs at https://authorization-server.com/docs/access_toke
      description: error response on HTTP 400 from auth/token per https://www.rfc-editor.org/rfc/rfc6749
    authServerInfo:
      required:
      - tokenURL
      type: object
      properties:
        tokenURL:
          maxLength: 8000
          minLength: 2
          type: string
          description: URL of the token endpoint.
          format: uri
      example:
        tokenURL: http://example.com/aeiou
    problem:
      type: object
      properties:
        type:
          maxLength: 8000
          minLength: 2
          type: string
          description: |
            An absolute URI that identifies the problem type.
            When dereferenced, it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          format: uri
          example: https://zalando.github.io/problem/constraint-violation
          default: about:blank
        title:
          type: string
          description: |
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable.
        status:
          maximum: 600
          exclusiveMaximum: true
          minimum: 100
          type: integer
          description: |
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          format: int32
          example: 503
        detail:
          type: string
          description: |
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          maxLength: 8000
          minLength: 3
          type: string
          description: |
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
          format: uri
      description: |
        reusable error response. From https://opensource.zalando.com/problem/schema.yaml.
    notifiersResponse:
      required:
      - WEBHOOK
      type: object
      properties:
        WEBHOOK:
          type: boolean
          description: Currently MUST be true
          example: true
        MQTT:
          $ref: "#/components/schemas/mqttNotifierBindingObject"
      description: Provides details of each notifier binding supported
      example:
        MQTT:
          URIS:
          - mqtts://broker.vtn.company.com
          - mqtts://broker.vtn.company.com
          serialization: JSON
          authentication: ""
        WEBHOOK: true
    mqttNotifierBindingObject:
      required:
      - URIS
      - authentication
      - serialization
      type: object
      properties:
        URIS:
          type: array
          items:
            type: string
            description: URIs for connection to MQTT broker
            format: uri
            example: mqtts://broker.vtn.company.com
        serialization:
          type: string
          description: "Currently always JSON, perhaps other formats supported in\
            \ future"
          enum:
          - JSON
        authentication:
          description: Authentication method supported for connection to MQTT broker
          oneOf:
          - $ref: "#/components/schemas/mqttNotifierAuthenticationAnonymous"
          - $ref: "#/components/schemas/mqttNotifierAuthenticationOauth2BearerToken"
          - $ref: "#/components/schemas/mqttNotifierAuthenticationCertificate"
      description: Details of MQTT binding for messaging protocol support
      example:
        URIS:
        - mqtts://broker.vtn.company.com
        - mqtts://broker.vtn.company.com
        serialization: JSON
        authentication: ""
    mqttNotifierAuthenticationAnonymous:
      required:
      - method
      type: object
      properties:
        method:
          type: string
          description: Specifies anonymous authentication
          enum:
          - ANONYMOUS
      description: MQTT broker anonymous authentication details
    mqttNotifierAuthenticationOauth2BearerToken:
      required:
      - method
      - username
      type: object
      properties:
        method:
          type: string
          description: Specifies OAuth2 bearer token authentication
          enum:
          - OAUTH2_BEARER_TOKEN
        username:
          type: string
          description: "Either the distinguished string \"{clientID}\", or any other\
            \ literal string"
      description: MQTT broker OAuth2 Bearer Token authentication details
    mqttNotifierAuthenticationCertificate:
      required:
      - caCert
      - clientCert
      - clientKey
      - method
      type: object
      properties:
        method:
          type: string
          description: Specifies certificate authentication
          enum:
          - CERTIFICATE
        caCert:
          type: string
          description: String containing the Certificate Authority certificate
        clientCert:
          type: string
          description: String containing the Client certificate
        clientKey:
          type: string
          description: String containing the client certificate private key
      description: MQTT broker mTLS client certificate authentication details
    notifierOperationsTopics:
      required:
      - DELETE
      - UPDATE
      type: object
      properties:
        CREATE:
          type: string
          description: |
            'Topic path for CREATE operations,
             not provided for notifications for a specific object ID,
             e.g. until programID foo is created, clients unable to
             request notifications of its creation'
          example: "{objectType}s/create"
        UPDATE:
          type: string
          description: Topic path for UPDATE operations
          example: "{objectType}s/update"
        DELETE:
          type: string
          description: Topic path for DELETE operations
          example: "{objectType}s/delete"
        ALL:
          type: string
          description: "Topic path for ALL operations, if supported by VTN"
          example: "{objectType}s/+"
      description: MQTT notifier topic names for notifications of subscribable-object
        operations
      example:
        ALL: "{objectType}s/+"
        DELETE: "{objectType}s/delete"
        CREATE: "{objectType}s/create"
        UPDATE: "{objectType}s/update"
    notifierTopicsResponse:
      required:
      - topics
      type: object
      properties:
        topics:
          $ref: "#/components/schemas/notifierOperationsTopics"
      example:
        topics:
          ALL: "{objectType}s/+"
          DELETE: "{objectType}s/delete"
          CREATE: "{objectType}s/create"
          UPDATE: "{objectType}s/update"
    programRequest_programDescriptions:
      required:
      - URL
      properties:
        URL:
          maxLength: 8000
          minLength: 2
          type: string
          description: A human or machine readable program description
          format: uri
          example: https://www.myCorporation.com/myProgramDescription
    reportRequest_resources:
      required:
      - intervals
      - resourceName
      type: object
      properties:
        resourceName:
          $ref: "#/components/schemas/resourceName"
        intervalPeriod:
          $ref: "#/components/schemas/intervalPeriod"
        intervals:
          type: array
          description: A list of interval objects.
          items:
            $ref: "#/components/schemas/interval"
      description: Report data associated with a resource.
    subscriptionRequest_objectOperations:
      required:
      - callbackUrl
      - objects
      - operations
      type: object
      properties:
        objects:
          type: array
          description: list of objects to subscribe to.
          items:
            $ref: "#/components/schemas/objectTypes"
        operations:
          type: array
          description: list of operations to subscribe to.
          items:
            type: string
            description: object operation to subscribe to.
            example: CREATE
            enum:
            - READ
            - CREATE
            - UPDATE
            - DELETE
        callbackUrl:
          maxLength: 8000
          minLength: 2
          type: string
          description: User provided webhook URL.
          format: uri
          example: https://myserver.com/send/callback/here
        bearerToken:
          type: string
          description: |
            User provided token.
            To avoid custom integrations, callback endpoints
            should accept the provided bearer token to authenticate VTN requests.
          nullable: true
          example: NCEJGI9E8ER9802UT9HUG
      description: "object type, operations, and callbackUrl."
  responses:
    badRequest:
      description: The request is malformed or invalid
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/problem"
    unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/problem"
    forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/problem"
    notFound:
      description: The specified resource was not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/problem"
    conflict:
